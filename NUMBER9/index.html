<html lang="en">

<head>
  <meta charset="UTF-8" />

  <title>NUMBER9 - Global Partnerships</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Dynamic favicon based on port -->
  <script>
    (function() {
      const port = window.location.port || '5175';
      if (port === '5176') {
        document.write('<link rel="icon" type="image/svg+xml" href="/admin-favicon.svg" />');
        document.title = 'NUMBER9 - Admin Console';
      } else {
        document.write('<link rel="icon" type="image/svg+xml" href="/favicon.svg" />');
      }
    })();
  </script>
</head>

</body>
