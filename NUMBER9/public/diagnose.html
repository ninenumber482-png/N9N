<!DOCTYPE html>
<html>
<head>
  <title>NUMBER9 - Diagnostic</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #0a0c12; color: #fff; max-width: 1000px; margin: 0 auto; }
    .section { background: #0c0e14; border: 1px solid #1f2128; padding: 20px; margin: 20px 0; border-radius: 8px; }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
    .warn { color: #fbbf24; }
    .info { color: #60a5fa; }
    pre { background: #0e1117; padding: 15px; border-radius: 4px; overflow: auto; font-size: 12px; color: #90ee90; border: 1px solid #1f2128; }
    button { padding: 10px 15px; background: #fbbf24; color: #000; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; margin: 5px 5px 5px 0; }
    button:hover { background: #f59e0b; }
    h3 { margin-top: 0; color: #fbbf24; }
    .status { padding: 10px; border-radius: 4px; margin: 10px 0; }
  </style>
</head>
<body>
<h1>NUMBER9 - Diagnostic</h1>

<div class="section">
  <h3>1. Browser Capabilities</h3>
  <div id="capabilities"></div>
</div>

<div class="section">
  <h3>2. localStorage Test</h3>
  <button onclick="testLocalStorage()">Test localStorage Read/Write</button>
  <div id="storage-test"></div>
</div>

<div class="section">
  <h3>3. Seed Default Users</h3>
  <button onclick="seedUsers()">Manually Seed Users</button>
  <div id="seed-result"></div>
</div>

<div class="section">
  <h3>4. Check Current Data</h3>
  <button onclick="checkData()">Check localStorage Data</button>
  <div id="check-result"></div>
</div>

<div class="section">
  <h3>5. Test Login Function</h3>
  <button onclick="testLogin('admin', 'admin123')">Test: admin/admin123</button>
  <button onclick="testLogin('demo', 'demo123')">Test: demo/demo123</button>
  <div id="login-test"></div>
</div>

<div class="section">
  <h3>6. Clear & Reset</h3>
  <button onclick="clearAll()" style="background: #ef4444;">Clear All localStorage</button>
  <div id="clear-result"></div>
</div>

<script>
// Test browser capabilities
function testCapabilities() {
  const caps = {
    'localStorage available': typeof localStorage !== 'undefined',
    'sessionStorage available': typeof sessionStorage !== 'undefined',
    'IndexedDB available': typeof indexedDB !== 'undefined',
    'Private/Incognito mode': !localStorage.getItem('_test_public'),
  };

  let html = '<table style="width:100%; border-collapse: collapse;">';
  Object.entries(caps).forEach(([k, v]) => {
    const status = v ? '<span class="success">✓</span>' : '<span class="error">✗</span>';
    html += `<tr style="border-bottom: 1px solid #1f2128;"><td>${k}</td><td style="text-align: right;">${status}</td></tr>`;
  });
  html += '</table>';

  document.getElementById('capabilities').innerHTML = html;
  return caps;
}

function testLocalStorage() {
  try {
    localStorage.setItem('_test_', 'works');
    const val = localStorage.getItem('_test_');
    localStorage.removeItem('_test_');

    if (val === 'works') {
      document.getElementById('storage-test').innerHTML = '<div class="status success">✓ localStorage is working properly</div>';
      return true;
    }
  } catch (e) {
    document.getElementById('storage-test').innerHTML = `<div class="status error">✗ localStorage error: ${e.message}</div>`;
    return false;
  }
}

function seedUsers() {
  try {
    const users = {
      "admin": {
        uuid: "u-admin-001", username: "admin", password: "admin123",
        displayName: "Administrator", email: "admin@number9.local", phone: "",
        country: "Indonesia", role: "admin", account_status: "ACTIVE",
        registration_status: "APPROVED", login_status: "ACTIVE",
        referralCode: "N9-ADMIN-001", bankName: "Bank BCA",
        bankAccountNumber: "1234567890", bankAccountName: "PT NUMBER9",
        createdAt: new Date().toISOString(), approvedAt: new Date().toISOString(),
        approvedBy: "system"
      },
      "demo": {
        uuid: "u-demo-001", username: "demo", password: "demo123",
        displayName: "Demo User", email: "demo@number9.local", phone: "081234567890",
        country: "Indonesia", role: "user", account_status: "ACTIVE",
        registration_status: "APPROVED", login_status: "ACTIVE",
        referralCode: "N9-DEMO-001", bankName: "Bank Mandiri",
        bankAccountNumber: "0987654321", bankAccountName: "Demo User",
        createdAt: new Date().toISOString(), approvedAt: new Date().toISOString(),
        approvedBy: "admin"
      }
    };

    localStorage.setItem('n9_users', JSON.stringify(users));
    localStorage.setItem('n9_users_by_uuid', JSON.stringify({
      'u-admin-001': 'admin',
      'u-demo-001': 'demo'
    }));
    localStorage.setItem('n9_users_by_code', JSON.stringify({
      'N9-ADMIN-001': 'u-admin-001',
      'N9-DEMO-001': 'u-demo-001'
    }));

    document.getElementById('seed-result').innerHTML = '<div class="status success">✓ Users seeded successfully</div>';
  } catch (e) {
    document.getElementById('seed-result').innerHTML = `<div class="status error">✗ Error: ${e.message}</div>`;
  }
}

function checkData() {
  const keys = ['n9_users', 'n9_auth', 'n9_users_by_uuid', 'n9_users_by_code'];
  let html = '<table style="width:100%; border-collapse: collapse;">';

  keys.forEach(k => {
    const val = localStorage.getItem(k);
    const status = val ? '<span class="success">✓ EXISTS</span>' : '<span class="error">✗ MISSING</span>';
    const size = val ? (val.length + ' bytes') : '—';
    html += `<tr style="border-bottom: 1px solid #1f2128;"><td>${k}</td><td style="text-align: right;">${status}</td><td style="text-align: right; padding-left: 20px;">${size}</td></tr>`;
  });

  html += '</table>';

  const users = localStorage.getItem('n9_users');
  if (users) {
    try {
      const parsed = JSON.parse(users);
      html += '<h4>Users in localStorage:</h4>';
      html += '<pre>' + JSON.stringify(parsed, null, 2).substring(0, 1000) + '</pre>';
    } catch (e) {
      html += '<p class="error">Invalid JSON in n9_users</p>';
    }
  }

  document.getElementById('check-result').innerHTML = html;
}

function testLogin(username, password) {
  const users = localStorage.getItem('n9_users');
  let result = '<p>Testing login: <strong>' + username + '</strong> / <strong>' + password + '</strong></p>';

  if (!users) {
    result += '<div class="status error">✗ No users in localStorage</div>';
    document.getElementById('login-test').innerHTML = result;
    return;
  }

  try {
    const usersObj = JSON.parse(users);
    const user = usersObj[username];

    if (!user) {
      result += '<div class="status error">✗ User not found: "' + username + '"</div>';
      result += '<p>Available users: ' + Object.keys(usersObj).join(', ') + '</p>';
    } else if (user.password !== password) {
      result += '<div class="status error">✗ Invalid password</div>';
    } else {
      result += '<div class="status success">✓ Login would succeed!</div>';
      result += '<pre>' + JSON.stringify({
        uuid: user.uuid,
        username: user.username,
        displayName: user.displayName,
        role: user.role,
        email: user.email
      }, null, 2) + '</pre>';
    }
  } catch (e) {
    result += '<div class="status error">✗ JSON parse error: ' + e.message + '</div>';
  }

  document.getElementById('login-test').innerHTML = result;
}

function clearAll() {
  localStorage.clear();
  document.getElementById('clear-result').innerHTML = '<div class="status success">✓ All localStorage cleared. Now seed users and try again.</div>';
}

// Run on load
window.addEventListener('load', () => {
  testCapabilities();
  testLocalStorage();
});
</script>
</body>
</html>
