<!doctype html>
<html lang="en" data-theme="base" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Number9 System D</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
      @keyframes n9-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body style="margin: 0; background-color: #05070d; color: #94a3b8">
    <app-root>
      <div
        style="
          display: flex;
          min-height: 100vh;
          min-height: 100dvh;
          align-items: center;
          justify-content: center;
          background-color: #05070d;
        ">
        <div style="text-align: center">
          <span
            style="
              display: inline-block;
              width: 1.25rem;
              height: 1.25rem;
              border: 2px solid #334155;
              border-right-color: #94a3b8;
              border-radius: 9999px;
              animation: n9-boot-spin 0.75s linear infinite;
            "></span>
          <p style="margin: 0.5rem 0 0; font-family: system-ui, sans-serif; font-size: 13px; color: #64748b">
            Loading...
          </p>
        </div>
      </div>
    </app-root>
  </body>
</html>
