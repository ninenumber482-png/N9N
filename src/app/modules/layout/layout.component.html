<div class="flex h-screen w-full overflow-hidden">
  <!-- Sidebar -->
  <app-sidebar></app-sidebar>

  <div class="flex min-h-0 grow flex-col overflow-hidden bg-background">
    <!-- Header -->
    <app-navbar></app-navbar>
    <!-- main content -->
    <div
      id="main-content"
      class="scrollbar-thumb-rounded scrollbar-track-rounded grow overflow-auto scrollbar-thin scrollbar-track-transparent scrollbar-thumb-muted">
      <div class="mx-auto px-5 py-6 sm:px-8 lg:px-10">
        <router-outlet></router-outlet>
      </div>
    </div>
    <!-- IP footer -->
    <div class="flex items-center justify-end gap-1 border-t border-border px-6 py-1.5 text-[11px] text-muted">
      <span>IP:</span>
      <span class="font-mono font-medium text-amber-500">{{ clientIp }}</span>
    </div>
  </div>

  <!-- Toast notifications -->
  <app-toast-container></app-toast-container>

  <!-- Welcome strip: app version + security stack (once per session) -->
  <app-dashboard-welcome-strip />

  <!-- Global confirm dialog (logout) — appendTo body agar tetap render saat navigasi -->
  <p-confirmdialog key="logout" appendTo="body" styleClass="n9-logout-dialog" />
</div>
