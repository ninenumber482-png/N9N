<section class="backdrop-blur-xs fixed bottom-0 z-0 block w-full bg-card/80 shadow-sm md:hidden">
  <div class="flex justify-between text-xs font-semibold text-muted-foreground">
    <button (click)="navigate('/notifications')" class="flex w-full flex-col items-center justify-center pt-3 pb-3 text-center hover:text-foreground">
      <svg-icon src="assets/icons/heroicons/outline/bell.svg" [svgClass]="'h-5 w-5'"> </svg-icon>
      <span class="">Notifications</span>
    </button>
    <button (click)="navigate('/bookmarks')" class="flex w-full flex-col items-center justify-center pt-3 pb-3 text-center hover:text-foreground">
      <svg-icon src="assets/icons/heroicons/outline/bookmark.svg" [svgClass]="'h-5 w-5'"> </svg-icon>
      <span class="text-xs">Bookmarks</span>
    </button>
    <button (click)="navigate('/stats')" class="flex w-full flex-col items-center justify-center pt-3 pb-3 text-center hover:text-foreground">
      <svg-icon src="assets/icons/heroicons/outline/chart-pie.svg" [svgClass]="'h-5 w-5'"> </svg-icon>
      <span class="text-xs">Stats</span>
    </button>
    <button (click)="navigate('/rewards')" class="flex w-full flex-col items-center justify-center pt-3 pb-3 text-center hover:text-foreground">
      <svg-icon src="assets/icons/heroicons/outline/gift.svg" [svgClass]="'h-5 w-5'"> </svg-icon>
      <span class="text-xs">Rewards</span>
    </button>
    <button (click)="navigate('/help')" class="flex w-full flex-col items-center justify-center pt-3 pb-3 text-center hover:text-foreground">
      <svg-icon src="assets/icons/heroicons/outline/information-circle.svg" [svgClass]="'h-5 w-5'"> </svg-icon>
      <span class="text-xs">Help</span>
    </button>
  </div>
</section>
