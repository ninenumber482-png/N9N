<nav
  [ngClass]="menuService.showSideBar ? 'w-[210px] xl:w-[280px]' : 'w-[70px]'"
  class="bg-sidebar hidden h-full flex-col justify-between pt-3 transition-all duration-300 lg:flex border-r border-sidebar-border">
  <div class="flex-1 min-h-0 overflow-hidden">
    <!-- Logo -->
    <div
      [ngClass]="menuService.showSideBar ? 'justify-between' : 'justify-center'"
      class="mx-4 mb-4 flex h-10 items-center">
      @if (menuService.showSideBar) {
        <div class="flex items-center gap-2.5">
          <div class="bg-primary flex items-center justify-center rounded-lg p-2 shadow-sm shadow-primary/20">
            <svg-icon src="assets/icons/logo.svg"> </svg-icon>
          </div>
          <div>
            <b class="text-sidebar-foreground block text-sm font-bold leading-tight">NUMBER9</b>
            <span class="text-sidebar-foreground/40 text-xs font-medium tracking-wider uppercase">Control Panel</span>
          </div>
        </div>
      }
      <button
        (click)="toggleSidebar()"
        class="text-sidebar-foreground/30 hover:text-sidebar-foreground flex items-center justify-center rounded-lg p-1.5 transition-all duration-200 hover:bg-sidebar-hover focus:outline-hidden"
        [ngClass]="{ 'rotate-180': !menuService.showSideBar }">
        <svg-icon src="assets/icons/heroicons/solid/chevron-double-left.svg"> </svg-icon>
      </button>
    </div>

    <!-- Menu Items -->
    <div
      class="h-full overflow-auto px-3">
      <app-sidebar-menu></app-sidebar-menu>
    </div>
  </div>

  <div class="mx-3 my-3 rounded-lg bg-sidebar-hover p-2.5">
    <div class="flex items-center gap-2.5">
      <div class="flex h-7 w-7 items-center justify-center rounded-md bg-sidebar-accent text-sidebar-accent-foreground">
        <svg-icon src="assets/icons/heroicons/outline/clock.svg" [svgClass]="'h-4 w-4'"></svg-icon>
      </div>
      @if (menuService.showSideBar) {
        <div class="min-w-0 flex-1">
          <p class="text-sidebar-foreground/80 truncate text-[11px] font-medium tabular-nums">{{ clockTime || '--:--:--' }} WIB</p>
          <p class="text-sidebar-foreground/30 truncate text-xs">System D · Connected</p>
        </div>
      }
    </div>
  </div>
</nav>
