<nav
  [ngClass]="menuService.showSideBar ? 'w-[220px] xl:w-[256px]' : 'w-[62px]'"
  class="bg-sidebar hidden h-full flex-col transition-all duration-300 lg:flex border-r border-sidebar-border">

  <!-- ── Logo / Brand ── -->
  <div class="flex items-center gap-3 border-b border-sidebar-border px-3.5 py-3.5">
    <div class="flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-lg bg-primary shadow-lg shadow-primary/25">
      <svg-icon src="assets/icons/logo.svg" [svgClass]="'h-4 w-4 text-white'"></svg-icon>
    </div>
    @if (menuService.showSideBar) {
      <div class="min-w-0 flex-1">
        <p class="text-sm font-bold leading-none tracking-wide text-white">NUMBER9</p>
        <p class="mt-0.5 text-[10px] font-medium uppercase tracking-[0.1em]" style="color: var(--sidebar-muted)">Admin Panel</p>
      </div>
      <button
        (click)="toggleSidebar()"
        class="flex h-6 w-6 flex-shrink-0 items-center justify-center rounded-md transition-all hover:bg-sidebar-hover focus:outline-hidden"
        style="color: var(--sidebar-muted)"
        title="Collapse">
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
    } @else {
      <button
        (click)="toggleSidebar()"
        class="flex h-7 w-7 items-center justify-center rounded-md transition-all hover:bg-sidebar-hover focus:outline-hidden"
        style="color: var(--sidebar-muted)"
        title="Expand">
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    }
  </div>

  <!-- ── Navigation ── -->
  <div class="flex-1 min-h-0 overflow-y-auto overflow-x-hidden py-3 px-2
              scrollbar-thin scrollbar-track-transparent scrollbar-thumb-sidebar-border">
    <app-sidebar-menu></app-sidebar-menu>
  </div>

  <!-- ── Footer: status + clock ── -->
  <div class="border-t border-sidebar-border px-3 py-2.5">
    <div class="flex items-center gap-2.5">
      <div class="relative flex h-7 w-7 flex-shrink-0 items-center justify-center rounded-lg bg-emerald-500/10">
        <span class="h-2 w-2 rounded-full bg-emerald-400"></span>
        <span class="absolute h-2 w-2 rounded-full bg-emerald-400 animate-ping opacity-60"></span>
      </div>
      @if (menuService.showSideBar) {
        <div class="min-w-0 flex-1">
          <p class="truncate font-mono text-xs font-semibold tabular-nums text-sidebar-foreground">
            {{ clockTime || '--:--:--' }} <span class="font-normal" style="color: var(--sidebar-muted)">WIB</span>
          </p>
          <p class="truncate text-[10px] text-emerald-400/70">System D · Connected</p>
        </div>
      }
    </div>
  </div>
</nav>
