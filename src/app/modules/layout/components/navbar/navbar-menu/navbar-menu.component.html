@for (menu of menuService.pagesMenu; track menu) {
  <div class="dropdown relative inline-block">
    <!-- Button -->
    <button
      [ngClass]="
        menu.selected || menu.active
          ? 'text-primary border-b-2 border-primary'
          : 'text-foreground/55 border-b-2 border-transparent hover:text-foreground/80'
      "
      class="mr-1 inline-flex items-center px-3 py-2 text-sm font-medium transition-colors">
      <span>{{ menu.group }}</span>
    </button>
    <!-- Dropdown -->
    <div
      class="dropdown-content absolute top-[100%] min-w-[200px] origin-top-left z-10"
      navbar-submenu
      [submenu]="menu.items">
    </div>
  </div>
}
