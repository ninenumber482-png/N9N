<div class="bg-background relative">
  <div class="mx-auto px-5">
    <div class="flex items-center justify-between py-3.5 lg:justify-start">
      <!-- Mobile Navigation Menu Button-->
      <div class="sm:order-1 lg:hidden">
        <button
          (click)="toggleMobileMenu()"
          type="button"
          class="bg-muted text-muted-foreground focus:ring-primary hover:bg-muted-foreground hover:text-muted inline-flex items-center justify-center rounded-md p-2 focus:outline-hidden focus:ring-2 focus:ring-inset"
          aria-expanded="false">
          <span class="sr-only">Open menu</span>
          <!-- Heroicon name: outline/menu -->
          <svg-icon src="assets/icons/heroicons/outline/menu.svg" [svgClass]="'h-6 w-6'"> </svg-icon>
        </button>
      </div>

      <!-- Logo -->
      <div class="flex items-center justify-start gap-3 sm:order-2 ltr:md:mr-10 rtl:md:ml-10 lg:hidden">
        <a class="bg-primary flex items-center justify-center rounded-sm p-2 focus:outline-hidden focus:ring-1">
          <svg-icon src="assets/icons/logo.svg"></svg-icon>
        </a>
        <b class="text-foreground hidden text-sm font-bold sm:block"> Number9 System D </b>
      </div>

      <!-- Desktop Menu -->
      <div class="hidden space-x-10 sm:order-3 lg:flex">
        <app-navbar-menu></app-navbar-menu>
      </div>

      <!-- Right Actions -->
      <div class="flex items-center gap-4 sm:order-4 lg:flex-1 lg:justify-end">
        <!-- Live Clock -->
        <span class="text-foreground font-mono text-xs tabular-nums">{{ currentTime }}</span>

        <!-- Notification Bell -->
        <div class="notif-wrapper relative">
          <button
            (click)="showNotifPanel = !showNotifPanel; $event.stopPropagation()"
            type="button"
            class="bg-muted text-muted-foreground hover:bg-card hover:text-foreground relative inline-flex items-center justify-center rounded-md p-2 transition-colors focus:outline-hidden focus:ring-2 focus:ring-primary"
            title="Notifications">
            <svg-icon src="assets/icons/heroicons/outline/bell.svg" [svgClass]="'h-5 w-5'"></svg-icon>
            @if (unreadCount > 0) {
              <span class="bg-destructive text-destructive-foreground absolute -top-1 -right-1 flex h-4 min-w-4 items-center justify-center rounded-full px-1 text-[10px] font-bold leading-none">
                {{ unreadCount > 99 ? '99+' : unreadCount }}
              </span>
            }
          </button>

          <!-- Notification Dropdown -->
          @if (showNotifPanel) {
            <div class="bg-card absolute right-0 top-full z-50 mt-2 w-80 overflow-hidden rounded-xl border border-white/10 shadow-2xl">
              <div class="flex items-center justify-between border-b border-white/10 px-4 py-3">
                <p class="text-foreground text-sm font-bold">Notifikasi</p>
                <div class="flex items-center gap-2">
                  <button (click)="toggleMute()" class="text-muted-foreground hover:text-foreground" [title]="isMuted ? 'Aktifkan suara' : 'Matikan suara'">
                    @if (isMuted) {
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                      </svg>
                    } @else {
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072M12 6l-4 4H4v4h4l4 4V6z" />
                      </svg>
                    }
                  </button>
                  @if (notifications.length > 0) {
                    <button (click)="clearAllNotifications()" class="text-muted-foreground hover:text-foreground text-xs">Hapus semua</button>
                  }
                </div>
              </div>
              <div class="max-h-80 overflow-y-auto">
                @if (notifications.length === 0) {
                  <div class="text-muted-foreground py-8 text-center text-sm">Tidak ada notifikasi</div>
                } @else {
                  @for (n of notifications; track n.id) {
                    <div class="border-b border-white/5 px-4 py-3 hover:bg-white/5">
                      <div class="flex items-start gap-3">
                        <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-full"
                          [class]="n.type === 'success' ? 'bg-emerald-500/20 text-emerald-400' :
                                   n.type === 'error' ? 'bg-red-500/20 text-red-400' :
                                   n.type === 'warning' ? 'bg-amber-500/20 text-amber-400' :
                                   'bg-sky-500/20 text-sky-400'">
                          <svg-icon src="assets/icons/heroicons/outline/information-circle.svg" [svgClass]="'h-4 w-4'"></svg-icon>
                        </div>
                        <div class="min-w-0 flex-1">
                          <p class="text-foreground text-xs font-semibold">{{ n.title }}</p>
                          @if (n.message) {
                            <p class="text-muted-foreground mt-0.5 truncate text-[11px]">{{ n.message }}</p>
                          }
                        </div>
                      </div>
                    </div>
                  }
                }
              </div>
            </div>
          }
        </div>

        <!-- Theme Toggle -->
        <button
          (click)="toggleTheme()"
          type="button"
          class="bg-muted text-muted-foreground hover:bg-card hover:text-foreground inline-flex items-center justify-center rounded-md p-2 transition-colors focus:outline-hidden focus:ring-2 focus:ring-primary"
          title="Toggle dark/light mode">
          @if (isDarkMode) {
            <svg-icon src="assets/icons/heroicons/outline/sun.svg" [svgClass]="'h-5 w-5'"></svg-icon>
          } @else {
            <svg-icon src="assets/icons/heroicons/outline/moon.svg" [svgClass]="'h-5 w-5'"></svg-icon>
          }
        </button>

        <!-- Logout Button -->
        @if (user$ | async) {
          <button
            (click)="logout()"
            type="button"
            class="text-primary hover:bg-primary/10 inline-flex items-center gap-2 rounded-md px-3 py-2 text-sm font-semibold transition-colors focus:outline-hidden focus:ring-2 focus:ring-primary">
            <svg-icon src="assets/icons/heroicons/outline/arrow-left-on-rectangle.svg" [svgClass]="'h-5 w-5'"></svg-icon>
            <span class="hidden sm:inline">Logout</span>
          </button>
        }
      </div>
    </div>
  </div>
  <!-- Mobile menu -->
  <app-navbar-mobile></app-navbar-mobile>
</div>
