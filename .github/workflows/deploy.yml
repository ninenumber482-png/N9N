name: NUMBER9 Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: dqsmpdetiqsqfnidekik
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      # ── Link Supabase project ──
      - name: Link Supabase project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      # ── Regression Test ──
      - name: Run regression test
        run: supabase db query --linked --file scripts/regression-test.sql

      # ── Build Angular Admin ──
      - name: Install Angular deps
        run: npm ci --legacy-peer-deps

      - name: Build Angular admin
        run: npm run build

      # ── Build React User ──
      - name: Install React deps
        working-directory: ./NUMBER9
        run: npm ci

      - name: Build React user
        working-directory: ./NUMBER9
        run: npm run build

      # ── Deploy ──
      - name: Deploy admin-proxy Edge Function
        run: supabase functions deploy admin-proxy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Angular admin to Cloudflare Pages
        run: |
          npx wrangler pages deploy dist/number9systemd/browser \
            --project-name number9-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy React user to Cloudflare Pages
        working-directory: ./NUMBER9
        run: |
          npx wrangler pages deploy dist \
            --project-name number9-app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy notification
        run: |
          echo "✅ NUMBER9 deployed successfully!"
          echo "  Admin: https://admin.mynumber9.uk"
          echo "  User:  https://app.mynumber9.uk"
