name: NUMBER9 Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: dqsmpdetiqsqfnidekik

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: bash scripts/deploy-edge-functions.sh

  deploy-apps:
    name: Build & Deploy Apps
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 11122ae982ff403dae31e176fc2207ea
      VITE_SUPABASE_URL: https://dqsmpdetiqsqfnidekik.supabase.co
      VITE_SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxc21wZGV0aXFzcWZuaWRla2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNjUyOTMsImV4cCI6MjA5NTY0MTI5M30.e429MImfeQcj3_DMbxkYHKD_5GS0ZwYD8QyZTaD0Lv0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      # ── Build Angular Admin ──
      - name: Install Angular deps
        run: npm ci --legacy-peer-deps

      - name: Build Angular admin
        run: npm run build

      # ── Build React User ──
      - name: Install React deps
        working-directory: ./NUMBER9
        run: npm ci

      - name: Build React user
        working-directory: ./NUMBER9
        run: npm run build

      # ── Deploy to Cloudflare Pages ──
      - name: Deploy Angular admin to Cloudflare Pages
        run: |
          cp _worker.js dist/number9systemd/browser/
          npx wrangler pages deploy dist/number9systemd/browser \
            --project-name number9-admin

      - name: Deploy React user to Cloudflare Pages
        working-directory: ./NUMBER9
        run: |
          npx wrangler pages deploy dist \
            --project-name number9-app

      - name: Deploy notification
        run: |
          echo "✅ NUMBER9 deployed successfully!"
          echo "  Admin: https://admin.mynumber9.uk"
          echo "  User:  https://app.mynumber9.uk"
